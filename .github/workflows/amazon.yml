stages:
  - test

image: python:3.10

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install pytest playwright pytest-html
  - python -m playwright install --with-deps
  - mkdir reports

chromium_test:
  stage: test
  script:
    - pytest --browser chromium --html=reports/report-chromium.html --self-contained-html
  artifacts:
    when: always
    paths:
      - reports/report-chromium.html

firefox_test:
  stage: test
  script:
    - pytest --browser firefox --html=reports/report-firefox.html --self-contained-html
  artifacts:
    when: always
    paths:
      - reports/report-firefox.html

webkit_test:
  stage: test
  script:
    - pytest --browser webkit --html=reports/report-webkit.html --self-contained-html
  artifacts:
    when: always
    paths:
      - reports/report-webkit.html